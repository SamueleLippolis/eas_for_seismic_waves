# config/single_experiment.yaml

experiment:
  name: single_synthetic_experiment
  output_dir: reports/single_synthetic_experiment

variables:
  order:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi

true_parameters:
  phi_percent: 41.0
  C_percent: 10.0
  S_b_percent: 90.0
  sigma_b_inv: 0.5
  xi: 2.7

synthetic_data:
  seed: 42
  noise:
    type: relative_gaussian
    relative_std: 0.01

objective:
  weights:
    W1: 1.0
    W2: 100.0

bounds:
  phi_percent: [0.0, 70.0]
  C_percent: [0.0, 100.0]
  S_b_percent: [80.0, 100.0]
  sigma_b_inv: [0.2, 25.0]
  xi: [2.5, 2.9]

optimizer:
  name: cmaes

optimizers:
  simulated_annealing:
    seed: 123
    max_iter: 5000
    initial_temperature: 1000.0
    final_temperature: 0.001
    step_scale: 0.10

  pso:
    seed: 123
    n_particles: 250
    max_iter: 500
    inertia_weight: 0.7
    cognitive_weight: 1.5
    social_weight: 1.5
    velocity_scale: 0.10

  cmaes:
    seed: 123
    population_size: 50
    max_iter: 500
    sigma0: 0.25

report:
  base_dir: reports
  run_name: pop50_iter500
  save_config: true
  save_history: true
  save_plot: true