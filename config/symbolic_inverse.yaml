experiment:
  name: symbolic_inverse_phase2_least_squares
  output_dir: reports/symbolic_inverse

surrogate:
  config_path: config/symbolic_surrogate.yaml

variables:
  order:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi

base_true_parameters:
  phi_percent: 41.0
  S_b_percent: 90.0
  sigma_b_inv: 0.5
  xi: 2.7

clay_sweep:
  variable: C_percent
  values: [10.0, 20.0, 30.0, 40.0, 50.0, 60.0, 70.0, 80.0, 90.0, 100.0]

synthetic_data:
  seed: 369
  noise:
    type: relative_gaussian
    relative_std: 0.01

objective:
  weights:
    W1: 1.0
    W2: 100.0

bounds:
  phi_percent: [0.0, 70.0]
  C_percent: [0.0, 100.0]
  S_b_percent: [80.0, 100.0]
  sigma_b_inv: [0.2, 25.0]
  xi: [2.5, 2.9]

optimizer:
  method: least_squares
  n_starts: 10 # 50 would be top
  seed: 123
  max_nfev: 2000
  ftol: 1.0e-10
  xtol: 1.0e-10
  gtol: 1.0e-10