experiment:
  name: symbolic_inverse_phase2_10000_parsimony_de_polish_w1_1_w2_100
  output_dir: reports/symbolic_inverse

surrogate:
  config_path: config/symbolic_surrogate.yaml

variables:
  order:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi

base_true_parameters:
  phi_percent: 41.0
  S_b_percent: 90.0
  sigma_b_inv: 0.5
  xi: 2.7

clay_sweep:
  variable: C_percent
  # [10.0, 20.0, 30.0, 40.0, 50.0, 60.0, 70.0, 80.0, 90.0, 100.0]
  values: [10.0, 20.0, 30.0, 40.0, 50.0, 60.0, 70.0, 80.0, 90.0, 100.0]

synthetic_data:
  seed: 369
  noise:
    type: relative_gaussian
    relative_std: 0.01

objective:
  weights:
    W1: 1.0
    W2: 100.0

bounds:
  phi_percent: [0.0, 70.0]
  C_percent: [0.0, 100.0]
  S_b_percent: [80.0, 100.0]
  sigma_b_inv: [0.2, 25.0]
  xi: [2.5, 2.9]

optimizer:
  #method: least_squares
  #n_starts: 25 # 50 would be top
  #seed: 123
  #max_nfev: 2000
  #ftol: 1.0e-10
  #xtol: 1.0e-10
  #gtol: 1.0e-10
  method: differential_evolution_polish
  seed: 123

  maxiter: 80
  popsize: 10
  tol: 1.0e-6

  least_squares_polish:
    enabled: true
    max_nfev: 1000
    ftol: 1.0e-8
    xtol: 1.0e-8
    gtol: 1.0e-8

selection:
  use_exact_reranking: false

exact_refinement:
  enabled: false # take it false otherwise is optimizing on true forward f 
  method: least_squares
  max_nfev: 2000
  ftol: 1.0e-10
  xtol: 1.0e-10
  gtol: 1.0e-10