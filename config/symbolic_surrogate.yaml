surrogate:
  name: symbolic_forward_phase2_parsimony
  output_dir: reports/symbolic_surrogate_checks

dataset:
  path: datasets/symbolic_regression/symbolic_forward_10000_phase2.parquet

features:
  source_columns:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi

  model_names:
    - phi
    - C
    - Sb
    - rb
    - xi

models:
  Vp:
    path: reports/symbolic_regression/phase2/symbolic_forward_10000_phase2_parsimony_20260716_114224/Vp/model.pkl
    output_transform: identity

  Vs:
    path: reports/symbolic_regression/phase2/symbolic_forward_10000_phase2_parsimony_20260716_114421/Vs/model.pkl
    output_transform: identity

  sqrt_sigma:
    path: reports/symbolic_regression/phase2/symbolic_forward_10000_phase2_parsimony_serious_20260716_121900/sqrt_sigma/model.pkl
    output_transform: square