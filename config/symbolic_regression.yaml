experiment:
  name: symbolic_forward_10000_serious
  output_dir: reports/symbolic_regression/phase2

dataset:
  path: datasets/symbolic_regression/symbolic_forward_10000.parquet

features:
  source_columns:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi

  model_names:
    - phi
    - C
    - Sb
    - rb
    - xi

targets:
  - name: sqrt_sigma # Vp Vs sigma sqrt_sigma
    source_column: sigma
    transform: sqrt


pysr:
  niterations: 500 # q50 s500
  populations: 40 # q20 s40 
  population_size: 30
  maxsize: 35 # q25 s35
  model_selection: best
  random_state: 123

  binary_operators:
    - "+"
    - "-"
    - "*"
    - "/"

  unary_operators:
    - "sqrt"
    #- "log"
    #- "exp"
    - "square"