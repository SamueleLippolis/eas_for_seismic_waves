# config/giulio_part1.yaml

experiment:
  name: giulio_part1_clay_sweep

variables:
  order:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi

base_true_parameters:
  phi_percent: 41.0
  S_b_percent: 90.0
  sigma_b_inv: 0.5
  xi: 2.7

clay_sweep:
  variable: C_percent
  values: [10.0, 20.0, 30.0, 40.0, 50.0, 60.0, 70.0, 80.0, 90.0, 100.0]

synthetic_data:
  seed: 3699 # 369 for SA and PSO, 3699 for CMAES 
  noise:
    type: relative_gaussian
    relative_std: 0.01

objective:
  weights:
    W1: 1.0
    W2: 100.0

bounds:
  phi_percent: [0.0, 70.0]
  C_percent: [0.0, 100.0]
  S_b_percent: [80.0, 100.0]
  sigma_b_inv: [0.2, 25.0]
  xi: [2.5, 2.9]

optimizer:
  name: cmaes_giulio

optimizers:
  simulated_annealing_giulio:
    seed_base: 246
    seed_add_clay_offset: true
    n_iters: 1000000
    T0: 10000.0
    step_frac: 0.1
    alpha: 0.85
    cooling_interval: 2000
    tol: 1.0e-9
    start: midpoint
    history_interval: 1000

  pso_giulio:
    seed_base: 246
    seed_add_clay_offset: true

    n_particles: 1996
    n_iters: 500

    tol: 1.0e-9

    w_start: 0.2
    w_end: 0.02
    c_soc: 1.49445
    c_cog: 1.49445

    vmax_abs: 0.02
    vmin_abs: 0.0

    init_mode: 1
    init_sigma_y: 0.02
    zero_vel: 0

    eps_improve: 1.0e-6
    patience: 1000

    history_interval: 10

  simulated_annealing:
    seed: 369
    max_iter: 200000
    initial_temperature: 10000.0
    final_temperature: 0.000001
    step_scale: 0.20
  
  cmaes_giulio:
    seed_base: 2466
    seed_add_clay_offset: true

    max_evals: 60000
    popsize: 64
    init_sigma_y: 0.5
    init_mode: 1
    tol: 1.0e-12

  pso:
    seed: 369
    n_particles: 2000
    max_iter: 2500
    w_start: 0.9
    w_end: 0.25
    c_social: 1.49445
    c_cognitive: 1.49445
    vmax_abs: 0.20
    init_mode: uniform
    init_sigma_y: 0.10
    boundary_handling: reflect
    tol: 1.0e-9

  cmaes:
    seed: 369
    population_size: 128
    max_iter: 1000
    sigma0: 0.30
    
report:
  base_dir: reports
  run_name: clay_sweep
  save_config: true
  save_history: false
  save_plot: true