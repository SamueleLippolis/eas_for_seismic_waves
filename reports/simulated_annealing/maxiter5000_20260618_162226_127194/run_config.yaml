constants_path: /home/samuele/projects/eas_for_seismic_waves/config/constants.yaml
experiment_path: /home/samuele/projects/eas_for_seismic_waves/config/single_experiment.yaml
experiment_config:
  experiment:
    name: single_synthetic_experiment
    output_dir: reports/single_synthetic_experiment
  variables:
    order:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi
  true_parameters:
    phi_percent: 41.0
    C_percent: 10.0
    S_b_percent: 90.0
    sigma_b_inv: 0.5
    xi: 2.7
  synthetic_data:
    seed: 42
    noise:
      type: relative_gaussian
      relative_std: 0.01
  objective:
    weights:
      W1: 1.0
      W2: 100.0
  bounds:
    phi_percent:
    - 0.0
    - 70.0
    C_percent:
    - 0.0
    - 100.0
    S_b_percent:
    - 80.0
    - 100.0
    sigma_b_inv:
    - 0.2
    - 25.0
    xi:
    - 2.5
    - 2.9
  optimizer:
    name: simulated_annealing
    seed: 123
    max_iter: 5000
    initial_temperature: 1000.0
    final_temperature: 0.001
    step_scale: 0.1
  report:
    base_dir: reports
    category: simulated_annealing
    run_name: maxiter5000
    save_config: true
    save_history: true
    save_plot: true
