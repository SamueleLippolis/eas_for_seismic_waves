constants_path: /home/samuele/projects/eas_for_seismic_waves/config/constants.yaml
experiment_path: /home/samuele/projects/eas_for_seismic_waves/config/giulio_part1.yaml
experiment_config:
  experiment:
    name: giulio_part1_clay_sweep
  variables:
    order:
    - phi_percent
    - C_percent
    - S_b_percent
    - sigma_b_inv
    - xi
  base_true_parameters:
    phi_percent: 41.0
    S_b_percent: 90.0
    sigma_b_inv: 0.5
    xi: 2.7
  clay_sweep:
    variable: C_percent
    values:
    - 10.0
    - 20.0
    - 30.0
    - 40.0
    - 50.0
    - 60.0
    - 70.0
    - 80.0
    - 90.0
    - 100.0
  synthetic_data:
    seed: 369
    noise:
      type: relative_gaussian
      relative_std: 0.01
  objective:
    weights:
      W1: 1.0
      W2: 100.0
  bounds:
    phi_percent:
    - 0.0
    - 70.0
    C_percent:
    - 0.0
    - 100.0
    S_b_percent:
    - 80.0
    - 100.0
    sigma_b_inv:
    - 0.2
    - 25.0
    xi:
    - 2.5
    - 2.9
  optimizer:
    name: pso
  optimizers:
    simulated_annealing:
      seed: 246
      seed_strategy: base_plus_clay_offset
      max_iter: 1000000
      initial_temperature: 10000.0
      alpha: 0.85
      cooling_interval: 2000
      step_frac: 0.1
      tol: 1.0e-09
      start: midpoint
    pso:
      seed: 246
      seed_strategy: base_plus_clay_offset
      n_particles: 1996
      max_iter: 500
      w_start: 0.2
      w_end: 0.02
      c_social: 1.49445
      c_cognitive: 1.49445
      vmax_abs: 0.02
      vmin_abs: 0.0
      init_mode: midpoint_gaussian
      init_sigma_y: 0.02
      zero_velocity: false
      eps_improve: 1.0e-06
      patience: 1000
      tol: 1.0e-09
    cmaes:
      seed: 246
      seed_strategy: base_plus_clay_offset
      max_evals: 60000
      population_size: 64
      sigma0: 0.5
      tol: 1.0e-12
      init_mode: midpoint
  report:
    base_dir: reports
    run_name: clay_sweep
    save_config: true
    save_history: false
    save_plot: true
